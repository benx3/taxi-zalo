    <script>
      // Đăng ký service worker (cache static, app load nhanh trên mobile)
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
